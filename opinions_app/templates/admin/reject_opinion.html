{% extends 'base.html' %}

{% block title %} Отклонение мнения {% endblock %}

{% block content %}
<div class="container mt-4">

    <div class="profile-header">
        <h4>Отклонение мнения</h4>
        <hr>
    </div>

    <div class="list-group-item mb-3">
        <strong>{{ opinion.tittle }}</strong>
        <br>
        <small class="text-muted">
            {{ opinion.text }}
        </small>
        <br>
        <small class="text-muted">
            Добавлено: {{ opinion.timestamp.strftime('%d-%m-%Y %H:%M') }}
        </small>
    </div>

    <form method="POST"
          action="{{ url_for('adminreject_opinion_confirm', id=opinion.id) }}">

        <div class="mb-3">
            <label class="form-label">
                Укажите причину отказа:
            </label>
            <textarea name="reason"
                      class="form-control"
                      rows="4"
                      required></textarea>
        </div>

        <button type="submit"
                class="btn btn-danger">
            Подтвердить отказ
        </button>

        <a href="{{ url_for('admin.pending_opinions_view') }}"
           class="btn btn-secondary">
            Отмена
        </a>

    </form>

</div>
{% endblock %}
